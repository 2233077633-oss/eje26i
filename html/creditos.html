<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creditos
    </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: #0b0b0b;
            color: #f1e9db;
            font-family: "Georgia", "Times New Roman", serif;
            padding: 20px;
        }
        .back-button {
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-family: "Courier New", monospace;
            font-size: 14px;
            color: #9b958d;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid rgba(217, 201, 179, 0.2);
            background: rgba(10,10,10,0.3);
            transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            margin-bottom: 20px;
        }
        .back-button:hover {
            transform: translateY(-2px);
            border-color: rgba(217, 201, 179, 0.5);
            color: #d9c9b3;
        }
        .credit-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .credit-item {
            text-align: center;
            max-width: 260px;
        }
        .credit-item img {
            display: block;
            margin: 0 auto;
            width: 250px;
            height: auto;
        }
        .credit-item p {
            margin: 10px 0 6px;
        }
        .credit-item .fa {
            display: inline-block;
            margin-top: 8px;
            color: #d9c9b3;
            text-align: center;
        }
    </style>
</head>
<body>
    <a class="back-button" href="../index.html">REGRESAR AL INICIO</a>
    <div class="credit-container">
        <div class="credit-item">
            <img src="../assets/esperanza.PNG" alt="Esperanza">
            <p>Alfonso Esperanza Benitez</p>
            <a href="https://www.instagram.com/alfons0_esp?igsh=bTc1emc3eWYxbmtl" class="fa fa-instagram fa-2x"></a>
        </div>
        <div class="credit-item">
            <img src="../assets/paulina.jpeg" alt="Paulina">
            <p>Paulina Alejandra Mata Rubio</p>
            <a href="https://www.instagram.com/pp_ldx?igsh=OWx0dXc4NjFyczV4" class="fa fa-instagram fa-2x"></a>
        </div>
        <div class="credit-item">
            <img src="../assets/salasdpr.PNG" alt="Salas DPR">
            <p>Enrique Salas Galindo</p>
            <a href="https://www.instagram.com/salasehdpr?igsh=ZTBkY2dubnoyampz&utm_source=qr" class="fa fa-instagram fa-2x"></a>
        </div>
    </div>
</body>
</html>
