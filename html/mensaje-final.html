<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #d9d2c6;
      --muted: #8c8377;
      --input-bg: rgba(10,10,10,0.65);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 500px at 50% 40%, #1c1612 0%, #0b0b0b 65%, #050505 100%);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 90px 20px 40px;
      text-align: center;
    }
    .menu {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(217, 201, 179, 0.25);
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d9c9b3;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    .menu a {
      color: inherit;
      text-decoration: none;
    }
    .menu a:hover {
      color: #ffffff;
    }
    .menu a.active {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255,255,255,0.55);
    }
    .wrap {
      display: grid;
      gap: 22px;
      justify-items: center;
      max-width: 760px;
      width: 100%;
    }
    .question {
      font-family: "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: clamp(14px, 2.8vw, 22px);
      color: var(--muted);
    }
    .answer {
      width: min(520px, 90vw);
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(217, 210, 198, 0.25);
      background: var(--input-bg);
      color: var(--text);
      font-family: "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      outline: none;
    }
    .answer::placeholder {
      color: rgba(217, 210, 198, 0.5);
    }
  </style>
</head>
<body>
  <nav class="menu">
    <a href="../index.html">Página principal</a>
    <a href="seleccion.html">Tendencia</a>
    <a href="mensaje1.html">Temporada</a>
    <a href="seleccion-final.html">Auténtico</a>
    <a class="active" href="mensaje-final.html">Armario</a>
  </nav>
  <div class="wrap">
    <div id="question" class="question">¿Qué dice tu ropa sobre ti?</div>
    <input
      id="answer"
      class="answer"
      type="text"
      placeholder="Escribe y presiona Enter"
      autocomplete="off"
      aria-label="Respuesta"
    />
  </div>
  <script>
    const questions = [
      "¿Qué dice tu ropa sobre ti?",
      "¿En qué momento todo empezó a verse igual?",
      "¿Por qué usamos ciertas prendas solo por tendencia?",
      "¿Realmente te gusta lo que llevas puesto?",
      "¿Te vistes para ti o para los demás?",
      "¿Elegiste ese estilo… o lo eligieron por ti?",
      "¿Eso que usas te representa o solo te integra?",
      "¿Eres tú… o una versión repetida de alguien más?"
    ];

    const questionEl = document.getElementById("question");
    const answerEl = document.getElementById("answer");

    function nextQuestion() {
      const lastIndex = Number(sessionStorage.getItem("armarioLastIndex"));
      let nextIndex = Math.floor(Math.random() * questions.length);

      if (questions.length > 1) {
        while (nextIndex === lastIndex) {
          nextIndex = Math.floor(Math.random() * questions.length);
        }
      }

      sessionStorage.setItem("armarioLastIndex", String(nextIndex));
      questionEl.textContent = questions[nextIndex];
    }

    answerEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        if (answerEl.value.trim().length > 0) {
          answerEl.value = "";
        }
        nextQuestion();
      }
    });

    window.addEventListener("load", () => {
      nextQuestion();
      answerEl.focus();
    });
  </script>
</body>
</html>
