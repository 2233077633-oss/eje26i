<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f1e9db;
      --muted: #b0a79b;
      --soft: #7b756d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 500px at 50% 40%, #1c1612 0%, #0b0b0b 65%, #050505 100%);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      cursor: pointer;
    }
    .copy {
      text-align: center;
      max-width: 900px;
    }
    .title {
      font-size: clamp(30px, 5vw, 56px);
      margin: 0 0 18px 0;
      font-weight: 600;
    }
    .lines {
      font-size: clamp(16px, 2.6vw, 24px);
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 28px 0;
    }
    .question {
      font-family: "Courier New", monospace;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--soft);
      font-size: 12px;
    }
  </style>
</head>
<body onclick="window.location.href='seleccion-final.html'">
  <main class="copy">
    <h1 class="title">Cada día, millones de prendas.</h1>
    <div class="lines">
      Producidas, compradas, descartadas.<br>
      La industria no vende ropa.<br>
      Vende identidades de temporada.
    </div>
    <div class="question">¿Cuántas identidades llevas en el armario?</div>
  </main>
</body>
</html>
