<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f1e9db;
      --muted: #b0a79b;
      --soft: #7b756d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 500px at 50% 40%, #1c1612 0%, #0b0b0b 65%, #050505 100%);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 90px 20px 40px;
      cursor: pointer;
    }
    .menu {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(217, 201, 179, 0.25);
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d9c9b3;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    .menu a {
      color: inherit;
      text-decoration: none;
    }
    .menu a:hover {
      color: #ffffff;
    }
    .menu a.active {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255,255,255,0.55);
    }
    .copy {
      text-align: center;
      max-width: 900px;
    }
    .title {
      font-size: clamp(30px, 5vw, 56px);
      margin: 0 0 18px 0;
      font-weight: 600;
    }
    .lines {
      font-size: clamp(16px, 2.6vw, 24px);
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 28px 0;
    }
    .question {
      font-family: "Courier New", monospace;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--soft);
      font-size: 12px;
    }
  </style>
</head>
<body onclick="window.location.href='seleccion-final.html'">
  <nav class="menu" onclick="event.stopPropagation()">
    <a href="../index.html">Página principal</a>
    <a href="seleccion.html">Tendencia</a>
    <a class="active" href="mensaje1.html">Temporada</a>
    <a href="seleccion-final.html">Auténtico</a>
    <a href="mensaje-final.html">Armario</a>
  </nav>
  <main class="copy">
    <h1 class="title">Cada día, millones de prendas.</h1>
    <div class="lines">
      Producidas, compradas, descartadas.<br>
      La industria no vende ropa.<br>
      Vende identidades de temporada.
    </div>
    <div class="question">¿Cuántas identidades llevas en el armario?</div>
  </main>
</body>
</html>
