<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siluetas</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: "Georgia", "Times New Roman", serif;
      cursor: pointer;
    }
    .stage {
      width: min(1200px, 100%);
      text-align: center;
    }
    .eyebrow {
      font-family: "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
      color: #7b756d;
      margin-bottom: 34px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 26px;
    }
    .card {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
    }
    .card img {
      max-height: 360px;
      width: auto;
      height: auto;
      mix-blend-mode: multiply;
      opacity: 0.92;
      filter: saturate(0.8) contrast(1.05);
    }
    .tone-1 { background: #8d5bb1; }
    .tone-2 { background: #ff3c7c; }
    .tone-3 { background: #00a86b; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 360px; }
    }
  </style>
</head>
<body onclick="window.location.href='mensaje1.html'">
  <main class="stage">
    <div class="eyebrow">SOBRE LA ROPA Y LO QUE CREEMOS QUE SOMOS.</div>
    <div class="grid">
      <div class="card tone-1"><img src="../assets/salas0.png" alt="Sal"></div>
      <div class="card tone-2"><img src="../assets/lina0.png" alt="Lina"></div>
      <div class="card tone-3"><img src="../assets/alfonso0.png" alt="Alfonso"></div>
    </div>
  </main>
</body>
</html>
