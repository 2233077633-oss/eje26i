<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siluetas</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 90px 20px 40px;
      font-family: "Georgia", "Times New Roman", serif;
      cursor: pointer;
    }
    .menu {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(217, 201, 179, 0.25);
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d9c9b3;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    .menu a {
      color: inherit;
      text-decoration: none;
    }
    .menu a:hover {
      color: #ffffff;
    }
    .menu a.active {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255,255,255,0.55);
    }
    .stage {
      width: min(1200px, 100%);
      text-align: center;
    }
    .eyebrow {
      font-family: "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
      color: #7b756d;
      margin-bottom: 34px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 26px;
    }
    .card {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
    }
    .card img {
      max-height: 360px;
      width: auto;
      height: auto;
      opacity: 1;
    }
    .tone-1,
    .tone-2,
    .tone-3 { background: transparent; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 360px; }
    }
  </style>
</head>
<body onclick="window.location.href='mensaje1.html'">
  <nav class="menu" onclick="event.stopPropagation()">
    <a href="../index.html">Página principal</a>
    <a class="active" href="seleccion.html">Tendencia</a>
    <a href="mensaje1.html">Temporada</a>
    <a href="seleccion-final.html">Auténtico</a>
    <a href="mensaje-final.html">Armario</a>
  </nav>
  <main class="stage">
    <div class="eyebrow">SOBRE LA ROPA Y LO QUE CREEMOS QUE SOMOS.</div>
    <div class="grid">
      <div class="card tone-1"><img id="img-1" src="../assets/fastuno.png" alt="Sal"></div>
      <div class="card tone-2"><img id="img-2" src="../assets/fastdos.png" alt="Lina"></div>
      <div class="card tone-3"><img id="img-3" src="../assets/fastcuatro.png" alt="Alfonso"></div>
    </div>
  </main>
  <script>
    (function() {
      const groups = [
        ["fastuno.png", "fastdos.png", "fastcuatro.png"],
        ["rojou.png", "rojoun.png", "rojouno.png"],
        ["azuluno.png", "azulun.png", "azulu.png"],
        ["naranjaun.png", "naranjauno.png", "naranjau.png"]
      ];

      const storageKey = 'seleccionGroupIndex';
      let index = Number(localStorage.getItem(storageKey));

      if (!Number.isInteger(index) || index < 0 || index >= groups.length) {
        index = 0;
      }

      const nextIndex = (index + 1) % groups.length;
      localStorage.setItem(storageKey, nextIndex);

      const selectedGroup = groups[nextIndex];
      const images = [
        document.getElementById('img-1'),
        document.getElementById('img-2'),
        document.getElementById('img-3')
      ];

      images.forEach((img, idx) => {
        if (img) {
          img.src = '../assets/' + selectedGroup[idx];
        }
      });
    })();
  </script>
</body>
</html>
