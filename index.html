<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Más que Tela</title>
  <link rel="icon" type="image/x-icon" href="html/favicon.ico">
  <style>
    :root {
      --bg: #0b0b0b;
      --bg-soft: #111111;
      --text: #f1e9db;
      --muted: #9b958d;
      --accent: #d9c9b3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 500px at 50% 30%, #1a1a1a 0%, #0b0b0b 55%, #050505 100%);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .hero {
      text-align: center;
      max-width: 900px;
      width: 100%;
      padding: 40px 24px 50px 24px;
    }
    .eyebrow {
      font-family: "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(48px, 9vw, 110px);
      margin: 0 0 28px 0;
      font-weight: 600;
      color: var(--text);
      text-shadow: 0 6px 14px rgba(0,0,0,0.7);
    }
    .start {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-family: "Courier New", monospace;
      font-size: 14px;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(217, 201, 179, 0.35);
      background: rgba(10,10,10,0.5);
      transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .start:hover {
      transform: translateY(-2px);
      border-color: rgba(217, 201, 179, 0.7);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="eyebrow">UNA OBRA SOBRE LA ROPA Y LO QUE CREEMOS QUE SOMOS.</div>
    <h1>Más que Tela</h1>
    <a class="start" href="html/seleccion.html">COMENZAR</a>
  </main>
</body>
</html>
